<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account — Expense Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-body">
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="toast-container" id="toastContainer">
        {% for category, message in messages %}
        <div class="toast toast-{{ category }}">
            <i class="fas {% if category == 'success' %}fa-check-circle{% else %}fa-exclamation-circle{% endif %}"></i>
            <span>{{ message }}</span>
            <button class="toast-close" onclick="this.parentElement.remove()">&times;</button>
        </div>
        {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <i class="fas fa-wallet"></i>
                </div>
                <h1>Create Account</h1>
                <p>Start tracking your expenses today</p>
            </div>

            <form class="auth-form" method="POST" action="" id="registerForm">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input
                            type="text"
                            id="name"
                            name="name"
                            placeholder="John Doe"
                            value="{{ name|default('') }}"
                            required
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input
                            type="email"
                            id="email"
                            name="email"
                            placeholder="you@example.com"
                            value="{{ email|default('') }}"
                            required
                        >
                    </div>
                    <span class="field-hint" id="emailHint"></span>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-input">
                        <i class="fas fa-lock"></i>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="Create a strong password"
                            required
                        >
                        <button type="button" class="toggle-password" onclick="togglePassword('password')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="strength-meter" id="strengthMeter">
                        <div class="strength-bar" id="strengthBar"></div>
                    </div>
                    <span class="field-hint" id="strengthText"></span>
                </div>

                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <div class="password-input">
                        <i class="fas fa-lock"></i>
                        <input
                            type="password"
                            id="confirm_password"
                            name="confirm_password"
                            placeholder="Confirm your password"
                            required
                        >
                        <button type="button" class="toggle-password" onclick="togglePassword('confirm_password')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <span class="field-hint" id="matchHint"></span>
                </div>

                <button type="submit" class="btn btn-primary btn-block">
                    <i class="fas fa-user-plus"></i>
                    <span>Create Account</span>
                </button>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="{{ url_for('auth.login') }}">Sign In</a></p>
            </div>
        </div>
    </div>

    <script>
        function togglePassword(id) {
            const input = document.getElementById(id);
            const icon = input.parentElement.querySelector('.toggle-password i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        function checkStrength(password) {
            let score = 0;
            if (password.length >= 6) score++;
            if (password.length >= 10) score++;
            if (/[A-Z]/.test(password) && /[a-z]/.test(password)) score++;
            if (/[0-9]/.test(password)) score++;
            if (/[^A-Za-z0-9]/.test(password)) score++;

            const levels = [
                { label: '', class: '', width: '0%', color: 'transparent' },
                { label: 'Very Weak', class: 'very-weak', width: '20%', color: '#ef4444' },
                { label: 'Weak', class: 'weak', width: '40%', color: '#f97316' },
                { label: 'Fair', class: 'fair', width: '60%', color: '#eab308' },
                { label: 'Strong', class: 'strong', width: '80%', color: '#22c55e' },
                { label: 'Very Strong', class: 'very-strong', width: '100%', color: '#4F8CFF' }
            ];

            return levels[score] || levels[0];
        }

        document.getElementById('password').addEventListener('input', function() {
            const password = this.value;
            const strengthBar = document.getElementById('strengthBar');
            const strengthText = document.getElementById('strengthText');

            if (password.length === 0) {
                strengthBar.style.width = '0%';
                strengthText.textContent = '';
                strengthText.className = 'field-hint';
                return;
            }

            const strength = checkStrength(password);
            strengthBar.style.width = strength.width;
            strengthBar.style.backgroundColor = strength.color;
            strengthText.textContent = strength.label;
            strengthText.className = 'field-hint strength-' + strength.class;

            checkPasswordMatch();
        });

        function checkPasswordMatch() {
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm_password').value;
            const matchHint = document.getElementById('matchHint');

            if (confirm.length === 0) {
                matchHint.textContent = '';
                matchHint.className = 'field-hint';
                return;
            }

            if (password === confirm) {
                matchHint.textContent = 'Passwords match';
                matchHint.className = 'field-hint hint-success';
            } else {
                matchHint.textContent = 'Passwords do not match';
                matchHint.className = 'field-hint hint-error';
            }
        }

        document.getElementById('confirm_password').addEventListener('input', checkPasswordMatch);

        let emailTimeout = null;
        document.getElementById('email').addEventListener('input', function() {
            const email = this.value.trim();
            const hint = document.getElementById('emailHint');

            clearTimeout(emailTimeout);

            if (email.length === 0) {
                hint.textContent = '';
                hint.className = 'field-hint';
                return;
            }

            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                hint.textContent = '';
                return;
            }

            emailTimeout = setTimeout(function() {
                hint.textContent = 'Checking availability...';
                hint.className = 'field-hint';

                fetch('/api/check-email?email=' + encodeURIComponent(email))
                    .then(function(res) { return res.json(); })
                    .then(function(data) {
                        if (data.available) {
                            hint.textContent = 'Email is available';
                            hint.className = 'field-hint hint-success';
                        } else {
                            hint.textContent = 'Email is already registered';
                            hint.className = 'field-hint hint-error';
                        }
                    })
                    .catch(function() {
                        hint.textContent = '';
                        hint.className = 'field-hint';
                    });
            }, 500);
        });

        document.addEventListener('DOMContentLoaded', function() {
            const toasts = document.querySelectorAll('.toast');
            toasts.forEach(function(toast, index) {
                setTimeout(function() {
                    toast.classList.add('fade-out');
                    setTimeout(function() {
                        toast.remove();
                    }, 400);
                }, 4000 + index * 300);
            });
        });
    </script>
</body>
</html>
